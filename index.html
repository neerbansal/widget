<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invincible OS Clock Widget</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

        @font-face {
            font-family: 'Molot';
            src: url('Molot.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #222; /* Dark background for visibility */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; /* Space between the widget and the bottom image */
        }

        .widget-container {
            position: relative;
            width: 997px;
            height: 917px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .clock-container {
            position: absolute;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .time {
            font-family: 'Molot', sans-serif;
            font-size: 180px;
            color: black;
            -webkit-text-stroke: 4px white;
            line-height: 1;
            margin: 0;
            padding: 0;
        }

        .timezone {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 80px;
            font-weight: bold; /* Bold Bebas Neue */
            color: white;
            -webkit-text-stroke: 2px black;
            line-height: 1;
            margin: 0;
            padding: 0;
            letter-spacing: 2px;
        }

        .fg-layer {
            z-index: 2;
        }

        .bottom-image {
            /* Pushed completely below the main container */
            display: block;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="widget-container">
            <div class="clock-container">
                <div class="time" id="timeDisplay">00:00</div>
                <div class="timezone" id="timezoneDisplay">UTC</div>
            </div>
            <img src="widget.png" class="layer fg-layer" alt="Foreground Widget Layer">
        </div>

        <img src="1cmbeneathwidget.png" class="bottom-image" alt="Background Layer Moved Below">
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const timeString = `${hours}:${minutes}`;

            let tzString = "";
            try {
                const tzFormatter = new Intl.DateTimeFormat('en-US', { timeZoneName: 'short' });
                const parts = tzFormatter.formatToParts(now);
                const tzPart = parts.find(part => part.type === 'timeZoneName');
                if (tzPart) {
                    tzString = tzPart.value;
                }
            } catch (e) {
                console.error("Error formatting timezone:", e);
            }

            if (!tzString) {
                const offset = -now.getTimezoneOffset();
                const offsetHours = Math.floor(Math.abs(offset) / 60);
                const sign = offset >= 0 ? '+' : '-';
                tzString = `GMT${sign}${offsetHours}`;
            }

            document.getElementById('timeDisplay').innerText = timeString;
            document.getElementById('timezoneDisplay').innerText = tzString;
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
