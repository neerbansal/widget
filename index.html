<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invincible OS Clock Widget</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

        @font-face {
            font-family: 'Molot';
            src: url('Molot.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #222; /* Dark background for visibility */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Scaled down container to fit mobile screens comfortably */
        .widget-master-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 480px; 
            padding: 10px;
        }

        .widget-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1080 / 917; /* Keeps original proportions perfectly */
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Main logo shell sits in the background layout layer */
        .bg-logo-layer {
            z-index: 1;
        }

        /* Precise targeting of the middle gap text zone */
        .clock-container {
            position: absolute;
            z-index: 10; /* Forces text to float completely on top of everything */
            left: 54%;   /* Centered in the white gap right next to 'BY' */
            top: 40%;    
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: auto;
        }

        .time {
            font-family: 'Molot', sans-serif;
            font-size: 85px; /* Shrunk down so it doesn't leak into adjacent text fields */
            color: black;
            -webkit-text-stroke: 3px white;
            line-height: 0.9;
            margin: 0;
            padding: 0;
            letter-spacing: -2px;
        }

        .timezone {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 38px;
            color: white;
            -webkit-text-stroke: 1.5px black;
            line-height: 1;
            margin: 0;
            padding: 0;
            letter-spacing: 1px;
            margin-top: -2px;
        }

        /* Moves the accent graphic completely outside the overlapping frame stack */
        .accent-strip {
            width: 85%;
            margin-top: -15px; /* Pulls it up tight right under 'universe' text line */
            z-index: 5;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="widget-master-wrapper">
        <div class="widget-container">
            <img src="widget.png" class="layer bg-logo-layer" alt="Widget Shell">
            
            <div class="clock-container">
                <div class="time" id="timeDisplay">00:00</div>
                <div class="timezone" id="timezoneDisplay">INDIA</div>
            </div>
        </div>

        <img src="1cmbeneathwidget.png" class="accent-strip" alt="Accent Layer">
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            // Format time: HH:MM (24-hour)
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('timeDisplay').innerText = `${hours}:${minutes}`;

            // Automatic timezone rendering logic
            let tzString = "INDIA"; // Set your default display string fallback
            try {
                const tzFormatter = new Intl.DateTimeFormat('en-US', { timeZoneName: 'short' });
                const parts = tzFormatter.formatToParts(now);
                const tzPart = parts.find(part => part.type === 'timeZoneName');
                if (tzPart && tzPart.value !== 'GMT+5:30') {
                    tzString = tzPart.value;
                }
            } catch (e) {
                console.error("Error formatting timezone:", e);
            }

            document.getElementById('timezoneDisplay').innerText = tzString;
        }

        // Initialize clock engine
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
